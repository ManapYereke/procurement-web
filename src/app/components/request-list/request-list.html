<h2>Заявки</h2>

<a routerLink="/create">Создать заявку</a>

@if (loading()) {
  <mat-spinner></mat-spinner>
}

<table mat-table [dataSource]="data()" class="mat-elevation-z8">

  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>Название</th>
    <td mat-cell *matCellDef="let el">
      <a [routerLink]="['/request', el.id]">
        {{ el.title }}
      </a>
    </td>
  </ng-container>

  <ng-container matColumnDef="category">
    <th mat-header-cell *matHeaderCellDef>Категория</th>
    <td mat-cell *matCellDef="let el">{{ el.category }}</td>
  </ng-container>

  <ng-container matColumnDef="maxPrice">
    <th mat-header-cell *matHeaderCellDef>Максимальная цена</th>
    <td mat-cell *matCellDef="let el">{{ el.maxPrice }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Статус</th>
    <td mat-cell *matCellDef="let el">{{ el.status }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

<mat-paginator
  [length]="total()"
  [pageSize]="size()"
  [pageIndex]="page()"
  [pageSizeOptions]="[5, 10, 25]"
  (page)="onPageChange($event)">
</mat-paginator>
